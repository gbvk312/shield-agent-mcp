name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Install dependencies
        run: uv sync --all-extras
        
      - name: Lint with ruff
        run: uv run ruff check .
        
      - name: Type check with mypy
        run: uv run mypy shield_agent
        
      - name: Run tests
        run: uv run pytest
